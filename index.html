<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle City Reimagined</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="bevy-canvas"></canvas>
<script>
    // Browsers suspend AudioContext until a user gesture. Intercept the
    // AudioContext constructor so we can resume all instances on first interaction.
    const audioContexts = [];
    const OrigAudioContext = window.AudioContext || window.webkitAudioContext;
    if (OrigAudioContext) {
        window.AudioContext = function(...args) {
            const ctx = new OrigAudioContext(...args);
            audioContexts.push(ctx);
            return ctx;
        };
        window.AudioContext.prototype = OrigAudioContext.prototype;
        if (window.webkitAudioContext) {
            window.webkitAudioContext = window.AudioContext;
        }
    }

    function resumeAll() {
        audioContexts.forEach(ctx => {
            if (ctx.state === "suspended") ctx.resume();
        });
    }

    document.addEventListener("click", resumeAll);
    document.addEventListener("keydown", resumeAll);
</script>
</body>
</html>
