app = 'battle-city'
primary_region = 'yyz'

[build]

# Matchbox signaling server (WebSocket over HTTPS)
[[services]]
  internal_port = 3536
  protocol = "tcp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

# TURN server - TCP
[[services]]
  internal_port = 3478
  protocol = "tcp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 3478

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
